name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Cart.slnx

      - name: Build
        run: dotnet build Cart.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Cart.slnx -c Release --no-build

      - name: Validate Docker Compose
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker image build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: cartapi:ci

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cartapi-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__CartDatabase: Host=postgres;Port=5432;Database=cartdb;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: cartapi-postgres
    environment:
      POSTGRES_DB: cartdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cartapi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cartdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cartapi-postgres-data:

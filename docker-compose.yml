services:
  postgres:
    image: postgres:17-alpine
    container_name: cartapi-postgres
    environment:
      POSTGRES_DB: cartdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cartapi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cartdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cartapi-postgres-data:
